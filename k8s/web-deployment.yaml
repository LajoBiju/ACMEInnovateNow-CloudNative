apiVersion: apps/v1
kind: Deployment
metadata:
  name: acme-web
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: acme-web
  template:
    metadata:
      labels:
        app: acme-web
    spec:
      containers:
        - name: web
          image: multi-tier-app-web:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: default
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
  selector:
    app: acme-web